name: Deploy to Kubernetes

on:
  push:
    branches: [main]

concurrency:
  group: deploy-discord-bot
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 011801494293.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: houston-discord-bot
  KUBE_NAMESPACE: discord
  KUBE_DEPLOYMENT: discord-bot
  KUBE_CONTAINER: discord-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          missing=()
          [ -z "${AWS_ACCESS_KEY_ID}" ] && missing+=("AWS_ACCESS_KEY_ID")
          [ -z "${AWS_SECRET_ACCESS_KEY}" ] && missing+=("AWS_SECRET_ACCESS_KEY")
          [ -z "${KUBE_CONFIG_B64}" ] && missing+=("KUBE_CONFIG_B64")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            echo "Configure them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_URI: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubectl
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          mkdir -p "${HOME}/.kube"
          printf '%s' "${KUBE_CONFIG_B64}" | base64 --decode > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          kubectl version --client
          kubectl -n "${KUBE_NAMESPACE}" get deployment "${KUBE_DEPLOYMENT}"

      - name: Run database migrations
        env:
          MIGRATION_JOB: discord-bot-migrate-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${MIGRATION_JOB}
            namespace: ${KUBE_NAMESPACE}
          spec:
            backoffLimit: 1
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: ${IMAGE_URI}
                    imagePullPolicy: Always
                    command: ["npx", "prisma", "migrate", "deploy"]
                    envFrom:
                      - secretRef:
                          name: discord-bot-secrets
          EOF

          kubectl -n "${KUBE_NAMESPACE}" wait --for=condition=complete "job/${MIGRATION_JOB}" --timeout=300s || {
            kubectl -n "${KUBE_NAMESPACE}" logs "job/${MIGRATION_JOB}" --all-containers=true
            exit 1
          }

      - name: Deploy image to Kubernetes
        run: |
          kubectl -n "${KUBE_NAMESPACE}" set image \
            "deployment/${KUBE_DEPLOYMENT}" \
            "${KUBE_CONTAINER}=${IMAGE_URI}"

          kubectl -n "${KUBE_NAMESPACE}" rollout status \
            "deployment/${KUBE_DEPLOYMENT}" \
            --timeout=300s

      - name: Verify running image
        run: |
          RUNNING_IMAGE="$(kubectl -n "${KUBE_NAMESPACE}" get deployment "${KUBE_DEPLOYMENT}" -o jsonpath="{.spec.template.spec.containers[?(@.name=='${KUBE_CONTAINER}')].image}")"

          if [ "${RUNNING_IMAGE}" != "${IMAGE_URI}" ]; then
            echo "::error::Expected ${IMAGE_URI}, got ${RUNNING_IMAGE}"
            exit 1
          fi

          echo "Deployment ${KUBE_NAMESPACE}/${KUBE_DEPLOYMENT} is running ${RUNNING_IMAGE}"
