name: Deploy to VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate required secrets
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        DIRECT_URL: ${{ secrets.DIRECT_URL }}
      run: |
        missing=()
        [ -z "${EC2_HOST}" ]          && missing+=("EC2_HOST")
        [ -z "${EC2_USERNAME}" ]      && missing+=("EC2_USERNAME")
        [ -z "${EC2_SSH_KEY}" ]       && missing+=("EC2_SSH_KEY")
        [ -z "${DISCORD_BOT_TOKEN}" ] && missing+=("DISCORD_BOT_TOKEN")
        [ -z "${INTERNAL_API_KEY}" ]  && missing+=("INTERNAL_API_KEY")
        [ -z "${DATABASE_URL}" ]      && missing+=("DATABASE_URL")
        [ -z "${DIRECT_URL}" ]        && missing+=("DIRECT_URL")

        echo "=== Secret presence report (no values shown) ==="
        echo "EC2_HOST          length: ${#EC2_HOST}"
        echo "EC2_USERNAME      length: ${#EC2_USERNAME}"
        echo "EC2_SSH_KEY       length: ${#EC2_SSH_KEY}"
        echo "DISCORD_BOT_TOKEN length: ${#DISCORD_BOT_TOKEN}"
        echo "INTERNAL_API_KEY  length: ${#INTERNAL_API_KEY}"
        echo "DATABASE_URL      length: ${#DATABASE_URL}"
        echo "DIRECT_URL        length: ${#DIRECT_URL}"

        if [ ${#missing[@]} -ne 0 ]; then
          echo ""
          echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
          echo "Configure them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
          exit 1
        fi
        echo "All required secrets are present."

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Create .env file
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} bash <<EOF
        set -e
        mkdir -p ~/houston_bot
        cd ~/houston_bot
        cat > .env <<'INNEREOF'
        DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
        INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}
        API_PORT=${{ secrets.API_PORT }}
        AI_AGENT_GUILD_ID=${{ secrets.AI_AGENT_GUILD_ID }}
        AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL }}
        AI_SERVICE_API_KEY=${{ secrets.AI_SERVICE_API_KEY }}
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        DIRECT_URL=${{ secrets.DIRECT_URL }}
        REPORT_FORUM_CHANNEL_ID=${{ secrets.REPORT_FORUM_CHANNEL_ID }}
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        SIMILARITY_THRESHOLD=${{ secrets.SIMILARITY_THRESHOLD }}
        MAX_SIMILAR_REPORTS=${{ secrets.MAX_SIMILAR_REPORTS }}
        INNEREOF
        echo ".env file created successfully"
        EOF

    - name: Pull code and build
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
        set -e
        cd ~

        # Clone or update repository
        if [ -d "houston_bot" ]; then
          echo "Updating existing repository..."
          cd houston_bot
          # Reset any local changes (e.g., yarn.lock modifications from npm install)
          git reset --hard HEAD
          git clean -fd
          git pull origin main
        else
          echo "Cloning repository for the first time..."
          git clone https://github.com/${{ github.repository }}.git houston_bot
          cd houston_bot
        fi

        # Install Node.js if needed (Amazon Linux)
        if ! command -v node &> /dev/null; then
          echo "Installing Node.js..."
          curl -fsSL https://rpm.nodesource.com/setup_lts.x | sudo bash -
          sudo yum install -y nodejs
        fi

        # Install PM2 globally if needed
        if ! command -v pm2 &> /dev/null; then
          echo "Installing PM2..."
          sudo npm install -g pm2
        fi

        # Install dependencies
        echo "Installing npm dependencies..."
        npm install

        # Run database migrations
        echo "Running database migrations..."
        npx prisma migrate deploy

        # Generate Prisma client (ensures types match schema after migrations)
        echo "Generating Prisma client..."
        npx prisma generate

        # Build TypeScript project
        echo "Building project..."
        npm run build

        echo "Build completed successfully!"
        EOF

    - name: Restart PM2 application
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
        set -e
        cd ~/houston_bot

        echo "Restarting PM2 application..."
        
        # Check if process exists and restart, otherwise start new
        if pm2 describe houston_bot > /dev/null 2>&1; then
          pm2 restart houston_bot --update-env
          echo "PM2 process restarted with updated environment"
        else
          pm2 start dist/index.js --name houston_bot
          echo "PM2 process started for the first time"
        fi

        # Wait a moment for the app to initialize
        sleep 3

        # Verify the application is running
        echo "Verifying PM2 status..."
        pm2 status houston_bot

        # Check if the process is online
        PM2_STATUS=$(pm2 jlist | jq -r '.[] | select(.name=="houston_bot") | .pm2_env.status')
        if [ "$PM2_STATUS" != "online" ]; then
          echo "ERROR: Application failed to start! Status: $PM2_STATUS"
          echo "Recent logs:"
          pm2 logs houston_bot --lines 20 --nostream
          exit 1
        fi

        echo "Deploy completed successfully! Application is running."
        EOF